<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALL Team 工作状态 (8 Agents)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); font-family: 'Noto Sans SC', sans-serif; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; background: linear-gradient(90deg, #ff6b9d, #c44cff, #6bffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #8892b0; margin-top: 10px; }
    .time-display { text-align: center; margin-bottom: 30px; }
    .time { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #00ffff; }
    .date { color: #8892b0; font-size: 0.9rem; margin-top: 5px; }
    .agents-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    @media (max-width: 900px) { .agents-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .agents-grid { grid-template-columns: 1fr; } }
    .agent-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
    .agent-card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
    .status-light { position: absolute; top: 15px; right: 15px; width: 10px; height: 10px; border-radius: 50%; background: #ff6b9d; box-shadow: 0 0 10px #ff6b9d; }
    .status-light.idle { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
    .avatar { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
    .agent-name { font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
    .agent-role { color: #8892b0; font-size: 0.8rem; text-align: center; margin-bottom: 15px; }
    .status-bar { display: flex; flex-direction: column; gap: 8px; }
    .status-item { display: flex; justify-content: space-between; font-size: 0.85rem; }
    .status-label { color: #8892b0; }
    .status-value { color: #fff; }
    .status-value.model { color: #c44cff; }
    .status-value.session { color: #ff6b9d; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
    .stat-box { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #00ffff; }
    .stat-label { color: #8892b0; font-size: 0.85rem; margin-top: 5px; }
    .refresh-info { text-align: center; color: #8892b0; font-size: 0.8rem; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">WALL TEAM STATUS</h1>
      <p class="subtitle">🤖 8 Agents | 本地实时监控</p>
    </div>
    <div class="time-display">
      <div class="time" id="clock">--:--:--</div>
      <div class="date" id="date">Loading...</div>
    </div>
    <div class="agents-grid" id="agents-grid">Loading...</div>
    <div class="stats-row" id="stats-row"></div>
    <div class="refresh-info" id="refresh-info">自动刷新中...</div>
  </div>
  <script>
    let statusData = {"wall-g":{"name":"WALL-G","model":"MiniMax M2.1","sessions":18,"status":"忙碌"},"wall-c":{"name":"WALL-C","model":"MiniMax M2.1","sessions":783,"status":"忙碌"},"wall-e":{"name":"WALL-E","model":"MiniMax M2.1","sessions":22,"status":"忙碌"},"wall-r":{"name":"WALL-R","model":"MiniMax M2.1","sessions":3,"status":"忙碌"},"wall-a":{"name":"WALL-A","model":"MiniMax M2.1","sessions":1,"status":"忙碌"},"wall-b":{"name":"WALL-B","model":"MiniMax M2.1","sessions":2,"status":"忙碌"},"wall-p":{"name":"WALL-P","model":"MiniMax M2.1","sessions":1,"status":"忙碌"},"wall-x":{"name":"WALL-X","model":"Step 3.5","sessions":4,"status":"忙碌"}};
    
    function render() {
      const grid = document.getElementById('agents-grid');
      const stats = document.getElementById('stats-row');
      
      let html = '';
      let totalSessions = 0;
      let busyCount = 0;
      
      for (const [key, agent] of Object.entries(statusData)) {
        totalSessions += agent.sessions;
        if (agent.status === '忙碌') busyCount++;
        
        html += `<div class="agent-card ${key}">
          <div class="status-light ${agent.status === '空闲' ? 'idle' : ''}"></div>
          <div class="avatar">${agent.status === '空闲' ? '🟢' : '🔵'}</div>
          <h2 class="agent-name">${agent.name}</h2>
          <p class="agent-role">Agent ${key.replace('wall-', '').toUpperCase()}</p>
          <div class="status-bar">
            <div class="status-item"><span class="status-label">状态</span><span class="status-value">${agent.status}</span></div>
            <div class="status-item"><span class="status-label">模型</span><span class="status-value model">${agent.model}</span></div>
            <div class="status-item"><span class="status-label">会话</span><span class="status-value session">${agent.sessions}</span></div>
          </div>
        </div>`;
      }
      
      grid.innerHTML = html;
      stats.innerHTML = `<div class="stat-box"><div class="stat-value">${totalSessions}</div><div class="stat-label">总会话数</div></div>
        <div class="stat-box"><div class="stat-value">${busyCount}</div><div class="stat-label">忙碌Agent</div></div>
        <div class="stat-box"><div class="stat-value">${8 - busyCount}</div><div class="stat-label">空闲Agent</div></div>
        <div class="stat-box"><div class="stat-value">8</div><div class="stat-label">总Agent数</div></div>`;
    }
    
    function updateClock() {
      const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
      const [date, time] = now.split(' ');
      document.getElementById('clock').textContent = time;
      document.getElementById('date').textContent = date;
      document.getElementById('refresh-info').textContent = '最后更新: ' + now;
    }
    
    async function refresh() {
      try {
        const res = await fetch('/api/status');
        statusData = await res.json();
        render();
      } catch (e) {
        console.log('Refresh failed:', e);
      }
    }
    
    render();
    updateClock();
    setInterval(() => { refresh(); updateClock(); }, 10000);
  </script>
</body>
</html>
