<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALL Team 工作状态 (8 Agents)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: radial-gradient(ellipse at 20% 20%, rgba(120, 0, 255, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(0, 200, 255, 0.15) 0%, transparent 50%), linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); font-family: 'Noto Sans SC', sans-serif; padding: 20px; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 150, 0.1) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.1) 0%, transparent 20%); pointer-events: none; z-index: 0; }
    .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 40px; }
    .title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; background: linear-gradient(90deg, #ff6b9d, #c44cff, #6bffff, #ff6b9d); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 3s ease infinite; text-shadow: 0 0 30px rgba(196, 76, 255, 0.5); letter-spacing: 4px; }
    @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .subtitle { color: #8892b0; margin-top: 10px; font-size: 1rem; }
    .time-display { text-align: center; margin-bottom: 30px; }
    .time { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #00ffff; text-shadow: 0 0 20px rgba(0, 255, 255, 0.7); }
    .date { color: #8892b0; font-size: 0.9rem; margin-top: 5px; }
    .agents-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    @media (max-width: 1100px) { .agents-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .agents-grid { grid-template-columns: 1fr; } }
    .agent-card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid transparent; }
    .agent-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--c1), var(--c2)); }
    .agent-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
    .agent-card.wall-g { --c1: #ff6b9d; --c2: #c44cff; }
    .agent-card.wall-c { --c1: #00ffff; --c2: #0099ff; }
    .agent-card.wall-e { --c1: #76ff03; --c2: #00e676; }
    .agent-card.wall-r { --c1: #ffab00; --c2: #ff6d00; }
    .agent-card.wall-a { --c1: #e040fb; --c2: #7c4dff; }
    .agent-card.wall-b { --c1: #ff5252; --c2: #ff1744; }
    .agent-card.wall-p { --c1: #40c4ff; --c2: #00b0ff; }
    .agent-card.wall-x { --c1: #b388ff; --c2: #8c9eff; }
    .agent-card.active { border-color: var(--c1); box-shadow: 0 0 30px rgba(255,255,255,0.1); }
    .agent-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); opacity: 0; transition: opacity 0.4s; pointer-events: none; }
    .agent-card:hover::after { opacity: 1; }
    .status-light { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border-radius: 50%; background: #ff6b9d; box-shadow: 0 0 10px #ff6b9d; animation: blink 1.5s ease-in-out infinite; }
    .status-light.idle { background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: none; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .avatar-container { display: flex; justify-content: center; margin-bottom: 15px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; animation: avatarPulse 2s ease-in-out infinite; }
    @keyframes avatarPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .agent-card.wall-g .avatar { background: linear-gradient(135deg, #ff6b9d, #c44cff); }
    .agent-card.wall-c .avatar { background: linear-gradient(135deg, #00ffff, #0099ff); }
    .agent-card.wall-e .avatar { background: linear-gradient(135deg, #76ff03, #00e676); }
    .agent-card.wall-r .avatar { background: linear-gradient(135deg, #ffab00, #ff6d00); }
    .agent-card.wall-a .avatar { background: linear-gradient(135deg, #e040fb, #7c4dff); }
    .agent-card.wall-b .avatar { background: linear-gradient(135deg, #ff5252, #ff1744); }
    .agent-card.wall-p .avatar { background: linear-gradient(135deg, #40c4ff, #00b0ff); }
    .agent-card.wall-x .avatar { background: linear-gradient(135deg, #b388ff, #8c9eff); }
    .agent-name { font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
    .agent-role { color: #8892b0; font-size: 0.8rem; text-align: center; margin-bottom: 15px; }
    .status-bar { display: flex; flex-direction: column; gap: 8px; }
    .status-item { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; }
    .status-label { color: #8892b0; }
    .status-value { color: #fff; font-weight: 600; }
    .status-value.model { color: var(--c1); }
    .status-value.session { color: #ff6b9d; }
    .skills-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px; justify-content: center; }
    .skill-badge { font-size: 0.7rem; padding: 4px 10px; background: rgba(255,255,255,0.08); border-radius: 20px; color: #8892b0; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
    .stat-box { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
    .stat-box:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); }
    .stat-value { font-size: 2rem; font-weight: 700; color: #00ffff; font-family: 'Orbitron', sans-serif; }
    .stat-label { color: #8892b0; font-size: 0.9rem; margin-top: 8px; }
    .activity-log { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; margin-top: 30px; }
    .log-title { color: #8892b0; font-size: 0.9rem; margin-bottom: 15px; }
    .log-entry { display: flex; gap: 15px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
    .log-time { color: #8892b0; min-width: 50px; }
    .log-agent { color: var(--c1); font-weight: 600; }
    .log-message { color: #ccc; }
    .refresh-info { text-align: center; color: #8892b0; font-size: 0.8rem; margin-top: 20px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">WALL TEAM STATUS</h1>
      <p class="subtitle">✦ 8 Agents Collaboration Panel ✦</p>
    </div>
    <div class="time-display">
      <div class="time" id="clock">--:--:--</div>
      <div class="date" id="date">Loading...</div>
    </div>
    <div class="agents-grid" id="agents-grid">Loading...</div>
    <div class="stats-row" id="stats-row"></div>
    <div class="activity-log">
      <h4 class="log-title">📋 最近活动</h4>
      <div class="log-container" id="log-container"></div>
    </div>
    <div class="refresh-info" id="refresh-info">🔄 自动刷新中...</div>
  </div>
  <script>
    let statusData = {"wall-g":{"name":"WALL-G","model":"M2.5","sessions":18,"status":"忙碌"},"wall-c":{"name":"WALL-C","model":"M2.5","sessions":783,"status":"忙碌"},"wall-e":{"name":"WALL-E","model":"M2.5","sessions":22,"status":"忙碌"},"wall-r":{"name":"WALL-R","model":"M2.5","sessions":3,"status":"忙碌"},"wall-a":{"name":"WALL-A","model":"M2.5","sessions":1,"status":"忙碌"},"wall-b":{"name":"WALL-B","model":"M2.5","sessions":2,"status":"忙碌"},"wall-p":{"name":"WALL-P","model":"M2.5","sessions":1,"status":"忙碌"},"wall-x":{"name":"WALL-X","model":"Step 3.5","sessions":4,"status":"忙碌"}};
    
    function render() {
      const grid = document.getElementById('agents-grid');
      const stats = document.getElementById('stats-row');
      
      let html = '';
      let totalSessions = 0;
      let busyCount = 0;
      const agentNames = { 'wall-g': '🦞', 'wall-c': '🤖', 'wall-e': '🔋', 'wall-r': '📡', 'wall-a': '🔔', 'wall-b': '🔵', 'wall-p': '💜', 'wall-x': '🟡' };
      const skills = { 'wall-g': ['Feishu', 'Discord', 'Memory'], 'wall-c': ['Feishu', 'Code', 'Tools'], 'wall-e': ['Exec', 'Monitor'], 'wall-r': ['Reminders'], 'wall-a': ['Apple'], 'wall-b': ['Bot'], 'wall-p': ['Project'], 'wall-x': ['Chat'] };
      
      for (const [key, agent] of Object.entries(statusData)) {
        totalSessions += agent.sessions;
        if (agent.status === '忙碌') busyCount++;
        
        html += `<div class="agent-card ${key} ${agent.status === '忙碌' ? 'active' : ''}">
          <div class="status-light ${agent.status === '空闲' ? 'idle' : ''}"></div>
          <div class="avatar-container">
            <div class="avatar">${agentNames[key] || '🤖'}</div>
          </div>
          <h2 class="agent-name">${agent.name}</h2>
          <p class="agent-role">Agent ${key.replace('wall-', '').toUpperCase()}</p>
          <div class="status-bar">
            <div class="status-item"><span class="status-label">状态</span><span class="status-value">${agent.status}</span></div>
            <div class="status-item"><span class="status-label">模型</span><span class="status-value model">${agent.model}</span></div>
            <div class="status-item"><span class="status-label">会话</span><span class="status-value session">${agent.sessions}</span></div>
          </div>
          <div class="skills-container">
            ${(skills[key] || []).map(s => `<span class="skill-badge">${s}</span>`).join('')}
          </div>
        </div>`;
      }
      
      grid.innerHTML = html;
      stats.innerHTML = `<div class="stat-box"><div class="stat-value">${totalSessions}</div><div class="stat-label">总会话数</div></div>
        <div class="stat-box"><div class="stat-value">${busyCount}</div><div class="stat-label">忙碌Agent</div></div>
        <div class="stat-box"><div class="stat-value">${8 - busyCount}</div><div class="stat-label">空闲Agent</div></div>
        <div class="stat-box"><div class="stat-value">8</div><div class="stat-label">在线Agent</div></div>`;
      
      document.getElementById('log-container').innerHTML = `<div class="log-entry"><span class="log-time">${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}</span><span class="log-agent" style="color:#00ffff">WALL-C</span><span class="log-message">实时监控运行中</span></div>`;
    }
    
    function updateClock() {
      const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
      const [date, time] = now.split(' ');
      document.getElementById('clock').textContent = time;
      document.getElementById('date').textContent = date;
      document.getElementById('refresh-info').textContent = '🔄 最后更新: ' + now + ' | 每10秒刷新';
    }
    
    async function refresh() {
      try {
        const res = await fetch('/api/status');
        statusData = await res.json();
        render();
      } catch (e) {
        console.log('Refresh failed:', e);
      }
    }
    
    render();
    updateClock();
    setInterval(() => { refresh(); updateClock(); }, 10000);
  </script>
</body>
</html>
