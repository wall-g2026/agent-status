<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALL TEAM // CYBERPUNK MONITOR</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
/* PURE CYBERPUNK DASHBOARD - HARD CORE */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --neon-cyan: #00ffff;
  --neon-magenta: #ff00ff;
  --neon-amber: #ffaa00;
  --neon-red: #ff0953;
  --neon-green: #00ff88;
  --bg-dark: #050505;
  --bg-panel: rgba(0, 10, 15, 0.85);
  --grid-color: rgba(0, 255, 255, 0.07);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-dark);
  color: var(--neon-cyan);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  padding: 20px;
  overflow-x: hidden;
  position: relative;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Scanlines effect */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 2px
  );
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}

.container {
  max-width: 1600px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 15px 25px;
  background: var(--bg-panel);
  border: 1px solid var(--neon-cyan);
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

.title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--neon-cyan);
  text-shadow: 0 0 10px var(--neon-cyan);
  letter-spacing: 2px;
}

.clock {
  font-size: 1.2rem;
  color: var(--neon-amber);
  text-shadow: 0 0 10px var(--neon-amber);
}

/* System Bar */
.sys-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.sys-item {
  background: var(--bg-panel);
  border: 1px solid rgba(0,255,255,0.4);
  padding: 12px 15px;
  border-radius: 4px;
  position: relative;
}

.sys-label {
  font-size: 0.7rem;
  color: rgba(0,255,255,0.7);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.sys-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--neon-green);
  text-shadow: 0 0 8px var(--neon-green);
}

.sys-bar .progress {
  height: 4px;
  background: rgba(0,255,255,0.2);
  margin-top: 6px;
  border-radius: 2px;
  overflow: hidden;
}

.sys-bar .progress-fill {
  height: 100%;
  background: var(--neon-cyan);
  box-shadow: 0 0 10px var(--neon-cyan);
  transition: width 0.5s ease;
}

/* Main layout */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}

/* Agents Grid */
.agents-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

@media (max-width: 1400px) { .agents-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 1100px) { .agents-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) { .agents-grid { grid-template-columns: 1fr); } }

.agent-card {
  background: var(--bg-panel);
  border: 1px solid rgba(0,255,255,0.3);
  border-radius: 4px;
  padding: 15px;
  position: relative;
  cursor: pointer;
  transition: all 0.3s ease;
  overflow: hidden;
}

.agent-card:hover {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0,255,255,0.4);
  transform: translateY(-2px);
}

.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  animation: scan 2s linear infinite;
}

@keyframes scan {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.agent-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.agent-name {
  font-weight: 700;
  font-size: 1rem;
  color: var(--neon-cyan);
  text-shadow: 0 0 8px var(--neon-cyan);
}

.agent-status {
  font-size: 0.75rem;
  padding: 4px 8px;
  border-radius: 2px;
  background: rgba(0,255,255,0.2);
  color: var(--neon-cyan);
  text-transform: uppercase;
}

.agent-status.highload {
  background: rgba(255,9,83,0.3);
  color: var(--neon-red);
  border: 1px solid var(--neon-red);
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.agent-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.metric {
  display: flex;
  flex-direction: column;
}

.metric-label {
  font-size: 0.65rem;
  color: rgba(0,255,255,0.6);
  margin-bottom: 2px;
}

.metric-value {
  font-size: 0.9rem;
  color: #fff;
  font-weight: 700;
}

.token-bar {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}

.token-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
  box-shadow: 0 0 10px var(--neon-cyan);
  transition: width 0.5s ease;
}

.token-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.7);
}

/* Side Panel */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.panel-box {
  background: var(--bg-panel);
  border: 1px solid rgba(0,255,255,0.4);
  border-radius: 4px;
  padding: 15px;
}

.panel-title {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--neon-cyan);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

/* Topology SVG */
.topology-svg {
  width: 100%;
  height: 200px;
  background: rgba(0, 20, 30, 0.5);
  border-radius: 4px;
}

/* Log container */
.log-container {
  height: 200px;
  overflow-y: auto;
  background: rgba(0, 20, 30, 0.5);
  border-radius: 4px;
  padding: 10px;
  font-size: 0.75rem;
  color: rgba(0,255,255,0.8);
}

.log-container::-webkit-scrollbar {
  width: 6px;
}

.log-container::-webkit-scrollbar-thumb {
  background: rgba(0,255,255,0.5);
}

.log-entry {
  margin-bottom: 4px;
  display: flex;
  gap: 10px;
}

.log-time {
  color: var(--neon-amber);
}

.log-agent {
  color: var(--neon-magenta);
  min-width: 60px;
}

/* Heatmap */
.heatmap-container canvas {
  width: 100%;
  height: 120px;
  background: rgba(0,20,30,0.5);
  border: 1px solid rgba(0,255,255,0.3);
}

/* Modal */
.modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  backdrop-filter: blur(5px);
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--bg-panel);
  border: 2px solid var(--neon-cyan);
  border-radius: 8px;
  width: 90%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 0 50px rgba(0,255,255,0.5);
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 1px solid rgba(0,255,255,0.3);
}

.modal-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--neon-cyan);
  text-shadow: 0 0 10px var(--neon-cyan);
}

.close-btn {
  background: transparent;
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  padding: 6px 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s;
}

.close-btn:hover {
  background: var(--neon-cyan);
  color: var(--bg-dark);
}

.modal-close {
  position: absolute;
  top: 15px;
  right: 60px;
  font-size: 1.5rem;
  color: var(--neon-cyan);
  cursor: pointer;
}

.modal-body {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 15px;
}

.chart-box {
  background: rgba(0,20,30,0.5);
  padding: 12px;
  border-radius: 4px;
  border: 1px solid rgba(0,255,255,0.2);
}

.chart-title {
  font-size: 0.8rem;
  color: var(--neon-cyan);
  margin-bottom: 10px;
  text-align: center;
}

.chart-canvas {
  width: 100%;
  height: 120px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,255,255,0.3);
}

/* Settings Modal */
#settings-modal .modal-content {
  max-width: 500px;
}

.setting-row {
  margin-bottom: 18px;
}

.setting-row label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--neon-cyan);
  margin-bottom: 6px;
  font-size: 0.9rem;
}

.setting-row input[type="number"] {
  width: 70px;
  background: rgba(0,255,255,0.1);
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  padding: 6px 8px;
  border-radius: 4px;
  font-family: inherit;
  text-align: center;
}

.setting-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--neon-cyan);
}

/* Alert Badge */
#alert-badge {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(255,9,83,0.9);
  color: #fff;
  padding: 12px 20px;
  border-radius: 4px;
  font-weight: 700;
  border: 2px solid var(--neon-red);
  box-shadow: 0 0 20px var(--neon-red);
  display: none;
  z-index: 9999;
  animation: alertPulse 0.8s ease-in-out infinite;
}

@keyframes alertPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Responsive */
@media (max-width: 1200px) {
  .main-layout { grid-template-columns: 1fr; }
  .agents-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 1100px) { .agents-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .agents-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) {
  .agents-grid { grid-template-columns: 1fr ); }
  .modal-body { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(0,255,255,0.1); }
::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-magenta); }

  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="alert-badge" id="alert-badge">⚠️ HIGH LOAD DETECTED</div>

  <div class="header">
    <div>
      <div class="title">✦ WALL TEAM MONITOR ✦</div>
      <div class="subtitle">REAL-TIME CYBERPUNK DASHBOARD V2.0</div>
    </div>
    <div style="text-align: right;">
      <div style="color: var(--neon-cyan); font-size: 0.8rem;" id="clock">00:00:00</div>
      <div style="color: #666; font-size: 0.7rem;" id="date">2026-03-01</div>
    </div>
  </div>

  <div class="system-bar">
    <div class="sys-item">
      <span class="sys-label">CPU</span>
      <span class="sys-value" id="sys-cpu">--</span>
      <div class="progress-mini"><div class="progress-mini-fill" id="cpu-bar" style="width: 0%; background: var(--neon-green);"></div></div>
    </div>
    <div class="sys-item">
      <span class="sys-label">MEM</span>
      <span class="sys-value" id="sys-mem">--</span>
      <div class="progress-mini"><div class="progress-mini-fill" id="mem-bar" style="width: 0%; background: var(--neon-cyan);"></div></div>
    </div>
    <div class="sys-item">
      <span class="sys-label">NET</span>
      <span class="sys-value" id="sys-net">--</span>
    </div>
    <div class="sys-item">
      <span class="sys-label">DISK</span>
      <span class="sys-value" id="sys-disk">--</span>
    </div>
  </div>

  <div class="main-layout">
    <div class="agents-grid" id="agents-grid">
      <!-- Agent cards rendered by JS -->
    </div>

    <div class="side-panel">
      <div class="panel-box">
        <div class="panel-title">🌐 NETWORK TOPOLOGY</div>
        <svg class="topology-svg" id="topology"></svg>
      </div>

      <div class="panel-box">
        <div class="panel-title">📋 ACTIVITY LOG</div>
        <div class="log-container" id="log-container"></div>
      </div>
    </div>
  </div>

  <!-- Agent Detail Modal -->
  <div class="modal" id="agent-modal">
    <div class="modal-content">
      <div class="modal-close" onclick="closeModal()">&times;</div>
      <div class="modal-header">
        <div class="modal-title" id="modal-title">AGENT DETAIL</div>
        <button class="close-btn" onclick="closeModal()">CLOSE</button>
      </div>
      <div class="modal-body">
        <div class="chart-box">
          <div class="chart-title">Token Usage (Recent Sessions)</div>
          <canvas class="chart-canvas" id="chart-token"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">Session Load (24h)</div>
          <canvas class="chart-canvas" id="chart-session"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">Resource Usage (CPU/MEM)</div>
          <canvas class="chart-canvas" id="chart-resource"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/status';
    const ALERT_THRESHOLD = 80; // token usage % to trigger alert
    
    let agents = {};
    let topologyAnimation;
    let alertSound = null;

    // Fetch real data from API
    async function fetchStatus() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        // Transform API data to our format
        const transformed = {};
        for (const [key, agent] of Object.entries(data)) {
          transformed[key] = {
            name: agent.name,
            emoji: agent.emoji || '🤖',
            status: agent.status,
            sessions: agent.sessions,
            tokens: agent.tokens || 0,
            tokenLimit: agent.tokenLimit || 200000,
            tokenPercent: agent.tokenPercent || Math.round((agent.tokens || 0) / (agent.tokenLimit || 200000) * 100),
            cpu: Math.floor(Math.random() * 30) + 5, // Placeholder - would come from system metrics
            mem: (Math.random() * 4 + 1).toFixed(1),
            net: { down: (Math.random() * 5).toFixed(1), up: (Math.random() * 2).toFixed(1) },
            skills: agent.skills || []
          };
        }
        agents = transformed;
        renderAgents();
        updateSystemBar();
        checkAlerts();
        addLog('System', 'Data refreshed from API');
      } catch (e) {
        console.error('Fetch failed:', e);
        addLog('ERROR', 'Failed to fetch status: ' + e.message);
      }
    }

    function renderAgents() {
      const grid = document.getElementById('agents-grid');
      let html = '';
      for (const [key, agent] of Object.entries(agents)) {
        const statusClass = agent.status === 'IDLE' ? 'idle' : agent.tokenPercent > 80 ? 'highload' : '';
        const loadColor = agent.tokenPercent > 80 ? 'var(--neon-red)' : agent.tokenPercent > 50 ? 'var(--neon-amber)' : 'var(--neon-green)';
        html += `
          <div class="agent-card ${key}" onclick="openModal('${key}')">
            <div class="agent-header">
              <span class="agent-name">${agent.emoji} ${agent.name}</span>
              <span class="agent-status ${statusClass}">${agent.status}</span>
            </div>
            <div class="agent-metrics">
              <div class="metric"><span class="metric-label">Sessions</span><span class="metric-value">${agent.sessions}</span></div>
              <div class="metric"><span class="metric-label">CPU</span><span class="metric-value">${agent.cpu}%</span></div>
              <div class="metric"><span class="metric-label">MEM</span><span class="metric-value">${agent.mem} GB</span></div>
              <div class="metric"><span class="metric-label">NET ↓↑</span><span class="metric-value">${agent.net.down} / ${agent.net.up} MB/s</span></div>
            </div>
            <div class="token-bar">
              <div class="token-fill" style="width: ${agent.tokenPercent}%"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.7rem;">
              <span style="color: #666;">TOKENS</span>
              <span style="color: ${loadColor};">${agent.tokens.toLocaleString()} / ${agent.tokenLimit.toLocaleString()} (${agent.tokenPercent}%)</span>
            </div>
          </div>
        `;
      }
      grid.innerHTML = html;
    }

    function updateSystemBar() {
      // Simulated system-wide metrics (would be from real system monitoring)
      const totalCpu = Object.values(agents).reduce((sum, a) => sum + a.cpu, 0);
      const avgCpu = Math.round(totalCpu / Object.keys(agents).length);
      const totalMem = Object.values(agents).reduce((sum, a) => sum + parseFloat(a.mem), 0);
      const avgMem = (totalMem / Object.keys(agents).length).toFixed(1);
      
      document.getElementById('sys-cpu').textContent = avgCpu + '%';
      document.getElementById('cpu-bar').style.width = avgCpu + '%';
      document.getElementById('sys-mem').textContent = avgMem + 'GB';
      document.getElementById('mem-bar').style.width = Math.min(100, (avgMem / 16) * 100) + '%';
      document.getElementById('sys-net').textContent = `↓${(Math.random()*10).toFixed(1)} ↑${(Math.random()*5).toFixed(1)} MB/s`;
      document.getElementById('sys-disk').textContent = '68%'; // placeholder
    }

    function checkAlerts() {
      const highLoadAgents = Object.entries(agents).filter(([k,a]) => a.tokenPercent > ALERT_THRESHOLD);
      const badge = document.getElementById('alert-badge');
      if (highLoadAgents.length > 0) {
        badge.classList.add('active');
        badge.textContent = `⚠️ HIGH LOAD: ${highLoadAgents.map(([k,a]) => a.name).join(', ')}`;
        // Could play sound here
      } else {
        badge.classList.remove('active');
      }
    }

    function addLog(agent, msg) {
      const container = document.getElementById('log-container');
      const now = new Date();
      const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${time}</span><span class="log-agent">[${agent}]</span><span class="log-msg">${msg}</span>`;
      container.insertBefore(entry, container.firstChild);
      if (container.children.length > 10) container.removeChild(container.lastChild);
    }

    // Topology visualization
    function drawTopology() {
      const svg = document.getElementById('topology');
      const w = svg.offsetWidth || 300;
      const h = 200;
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      
      const nodes = Object.keys(agents);
      const positions = {};
      const centerX = w/2, centerY = h/2;
      const radius = Math.min(w,h)/3;
      
      // Position nodes in a circle
      nodes.forEach((node, i) => {
        const angle = (i / nodes.length) * Math.PI * 2 - Math.PI/2;
        positions[node] = {
          x: centerX + Math.cos(angle) * radius,
          y: centerY + Math.sin(angle) * radius
        };
      });

      // Build SVG
      let svgContent = '';
      
      // Connection lines (all-to-all for simplicity)
      nodes.forEach((a, i) => {
        nodes.slice(i+1).forEach(b => {
          const pa = positions[a], pb = positions[b];
          svgContent += `<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="rgba(0,255,255,0.2)" stroke-width="1" />`;
        });
      });

      // Nodes
      nodes.forEach(node => {
        const pos = positions[node];
        const color = getNodeColor(node);
        svgContent += `
          <circle cx="${pos.x}" cy="${pos.y}" r="12" fill="${color}" fill-opacity="0.3" stroke="${color}" stroke-width="2">
            <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
          </circle>
          <text x="${pos.x}" y="${pos.y+3}" text-anchor="middle" fill="#fff" font-size="8" font-family="Orbitron">${agents[node].emoji}</text>
        `;
      });

      svg.innerHTML = svgContent;
    }

    function getNodeColor(node) {
      const agent = agents[node];
      if (!agent) return '#00ffff';
      if (agent.status === 'IDLE') return 'var(--neon-amber)';
      if (agent.tokenPercent > 80) return 'var(--neon-red)';
      return 'var(--neon-cyan)';
    }

    // Modal charts
    function initCharts() {
      // In real version, would fetch historical data
      drawLineChart('chart-token', [10,25,18,30,45,60,55,70,65,80,75,90], '#00ffff');
      drawLineChart('chart-session', [15,18,22,19,25,30,28,35,32,40,38,45], '#ff00ff');
      drawLineChart('chart-resource', [30,45,40,60,50,70,65,80,75,90,85,95], '#ffaa00');
    }

    function drawLineChart(canvasId, data, color) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.shadowColor = color; ctx.shadowBlur = 10;
      ctx.beginPath();
      const step = w / (data.length - 1);
      data.forEach((val, i) => {
        const x = i * step;
        const y = h - (val / 100) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.lineTo(w, h); ctx.lineTo(0, h);
      ctx.fillStyle = color.replace(')', ', 0.1)').replace('rgb', 'rgba');
      ctx.fill();
    }

    // Modal controls
    function openModal(agentKey) {
      const agent = agents[agentKey];
      document.getElementById('modal-title').textContent = `${agent.emoji} ${agent.name} DETAIL`;
      initCharts();
      addLog('UI', `Opened detail for ${agent.name}`);
      document.getElementById('agent-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('agent-modal').classList.remove('active');
    }

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
      document.getElementById('date').textContent = now.toLocaleDateString('zh-CN');
    }

    // Init
    function init() {
      fetchStatus();
      updateClock();
      setInterval(updateClock, 1000);
      setInterval(fetchStatus, 10000);
      setInterval(drawTopology, 5000);
      drawTopology();
    }

    window.onload = init;
  </script>
</body>
</html>
